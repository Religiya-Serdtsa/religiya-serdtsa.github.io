name: Deploy Blog

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.74'
          actions-cache-folder: '.emsdk-cache'

      - name: Build WASM search module
        run: make wasm-search

      - name: Generate static site from root posts
        run: make clean static-site

      - name: Prepare gh-pages worktree
        run: |
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add -B gh-pages gh-pages-worktree origin/gh-pages
          else
            git worktree add --orphan -b gh-pages gh-pages-worktree
          fi

      - name: Sync built site to root of gh-pages branch
        run: |
          rsync -a --delete --exclude='.git' docs/ gh-pages-worktree/

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-worktree
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "Deploy from $(git -C .. rev-parse --short HEAD)"
          git push origin gh-pages
