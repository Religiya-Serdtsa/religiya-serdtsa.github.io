name: Deploy Blog

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.74'
          actions-cache-folder: '.emsdk-cache'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build WASM search module
        run: make wasm-search

      - name: Generate static site from root posts
        run: make clean static-site

      - name: Verify committed docs are up to date
        run: |
          git diff --exit-code -- docs || {
            echo "::error::docs/ is out of date. Run 'make clean static-site' and commit the generated files."
            exit 1
          }

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
