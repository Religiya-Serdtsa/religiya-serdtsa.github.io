name: Deploy Blog

on:
  push:
    branches: ["gh-pages"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "testing-builds"
  cancel-in-progress: true

jobs:
  publish-testing-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.74'
          actions-cache-folder: '.emsdk-cache'

      - name: Build WASM search module
        run: make wasm-search

      - name: Generate static site from root posts
        run: make clean static-site

      - name: Derive testing build directory
        id: metadata
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          echo "folder=${short_sha}-testing-build" >> "$GITHUB_OUTPUT"

      - name: Prepare gh-pages worktree
        run: |
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add -B gh-pages gh-pages-worktree origin/gh-pages
          else
            git worktree add -B gh-pages gh-pages-worktree HEAD
          fi

      - name: Sync testing build into gh-pages branch
        run: |
          target="${{ steps.metadata.outputs.folder }}"
          rm -rf "gh-pages-worktree/${target}"
          mkdir -p "gh-pages-worktree/${target}"
          rsync -a --delete docs/ "gh-pages-worktree/${target}/"

      - name: Commit and push testing build
        run: |
          target="${{ steps.metadata.outputs.folder }}"
          cd gh-pages-worktree
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${target}"
          if git diff --cached --quiet; then
            echo "No testing build changes to publish."
            exit 0
          fi
          git commit -m "Add testing build ${target}"
          git push origin gh-pages
